<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weboreel - Zen Garden</title>
    <!-- Project: Weboreel - Zen Garden v6 (Spotify Integration) -->
    <!-- Developer: Atharv Jeetendra Gaware | Roll No: C-35 -->
    <style>
        :root {
            --inhale-color: radial-gradient(circle, #a2c2e1, #1e3a8a);
            --exhale-color: radial-gradient(circle, #d8bfd8, #4b0082);
            --panic-color: #2a0808;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --panel-bg: rgba(10, 20, 15, 0.85);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a0a0a;
            transition: background-color 1s ease;
            overflow: hidden;
            color: white;
        }

        /* Top Navigation / Controls */
        #top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 10px 20px;
            border-radius: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        select, button {
            background: transparent;
            color: white;
            border: none;
            font-size: 1rem;
            outline: none;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        select option {
            background: #0d2b24;
            color: white;
        }

        button:hover { opacity: 0.8; }

        .timer-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 70px;
        }

        .timer-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
        }

        .timer-value {
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 2px;
        }

        /* Main Container */
        #zen-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
            position: relative;
        }

        .ui-overlay {
            position: absolute;
            top: 22%;
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }

        #instruction {
            font-size: 2.5rem;
            font-weight: 300;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            transition: color 0.5s ease;
        }

        #vibe-statusText {
            font-size: 1.2rem;
            opacity: 0.7;
            transition: opacity 0.5s ease;
        }

        /* Breathing Sphere */
        #breathing-sphere {
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.05);
            transition: transform 1s ease-in-out, background 1s ease, box-shadow 1s ease;
            z-index: 5;
        }

        /* Auto Mode Animations */
        .auto-breathe-sama { animation: samaVritti 16s infinite linear; }
        .auto-breathe-ujjayi { animation: ujjayiBreath 10s infinite ease-in-out; }
        .auto-breathe-nadi { animation: nadiShodhana 12s infinite ease-in-out; }

        @keyframes samaVritti {
            0%   { transform: scale(1); background: rgba(255, 255, 255, 0.1); }
            25%  { transform: scale(3); background: rgba(255, 255, 255, 0.3); box-shadow: 0 0 100px rgba(255,255,255,0.4); } 
            50%  { transform: scale(3); background: rgba(255, 255, 255, 0.3); } 
            75%  { transform: scale(1); background: rgba(255, 255, 255, 0.1); box-shadow: 0 0 50px rgba(255,255,255,0.05); } 
            100% { transform: scale(1); background: rgba(255, 255, 255, 0.1); } 
        }

        @keyframes ujjayiBreath {
            0%   { transform: scale(1); background: rgba(255, 255, 255, 0.1); }
            50%  { transform: scale(2.5); background: rgba(100, 200, 255, 0.2); box-shadow: 0 0 80px rgba(100,200,255,0.3); }
            100% { transform: scale(1); background: rgba(255, 255, 255, 0.1); }
        }

        @keyframes nadiShodhana {
            0%   { transform: scale(1) translateX(0); background: rgba(255, 255, 255, 0.1); }
            45%  { transform: scale(2) translateX(-30px); background: rgba(255, 200, 100, 0.2); }
            50%  { transform: scale(2) translateX(-30px); background: rgba(255, 200, 100, 0.2); }
            95%  { transform: scale(1) translateX(30px); background: rgba(255, 255, 255, 0.1); }
            100% { transform: scale(1) translateX(0); background: rgba(255, 255, 255, 0.1); }
        }

        /* Background & Nature */
        #mesh-gradient {
            position: absolute;
            width: 200%;
            height: 200%;
            z-index: 0;
            background: radial-gradient(circle at 50% 50%, #0d2b24, #1a472a, #000); 
            filter: blur(80px);
            animation: moveGradient 15s infinite alternate;
        }

        @keyframes moveGradient {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(10%, 10%); }
        }

        #nature-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }

        .particle {
            position: absolute;
            background: rgba(144, 238, 144, 0.6);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(144, 238, 144, 0.8);
            bottom: -10px;
            animation: floatUp linear forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-110vh) scale(1.5); opacity: 0; }
        }

        /* Insights Dashboard Modal */
        #insights-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 50;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .modal-content {
            background: var(--panel-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px 40px;
            width: 80%;
            max-width: 650px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            text-align: left;
            box-shadow: 0 10px 50px rgba(0,0,0,0.5);
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 20px; right: 20px;
            font-size: 1.5rem;
            cursor: pointer;
            color: white;
            opacity: 0.7;
        }
        .close-btn:hover { opacity: 1; }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 15px 0;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .stat-card h3 { margin: 0 0 5px 0; font-size: 0.8rem; opacity: 0.8; text-transform: uppercase; }
        .stat-card p { margin: 0; font-size: 1.8rem; font-weight: 300; }

        /* Breath Log List */
        .log-section {
            flex-grow: 1;
            margin-top: 15px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .log-container {
            flex-grow: 1;
            overflow-y: auto;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 10px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .log-container::-webkit-scrollbar { width: 6px; }
        .log-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }

        .log-item {
            display: flex;
            justify-content: space-between;
            background: rgba(255,255,255,0.05);
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 0.9rem;
            border-left: 3px solid #90ee90;
        }
        .log-item.warning { border-left-color: var(--panic-color); }
        
        .log-time { opacity: 0.6; font-family: monospace; }
        .log-duration { font-weight: bold; }

        .suggestion-box {
            background: rgba(144, 238, 144, 0.1);
            border-left: 4px solid #90ee90;
            padding: 15px;
            margin-top: 20px;
            line-height: 1.5;
            font-size: 0.95rem;
        }

        h2 { font-weight: 300; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; margin-top: 0; }
        h3 { font-weight: 400; font-size: 1.1rem; margin: 0 0 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }

        /* Spotify Widget */
        #spotify-widget-container {
            position: absolute;
            bottom: 30px;
            right: 30px;
            z-index: 30;
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
            transition: opacity 0.5s ease, transform 0.5s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 12px;
        }

        #spotify-widget-container.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

    </style>
</head>
<body>

    <div id="top-bar">
        <div class="glass-panel">
            <select id="asana-selector">
                <option value="interactive">Pranayama: Mindful Touch (Interactive)</option>
                <option value="sama">Asana: Sama Vritti (Box Breathing)</option>
                <option value="anapanasati">Asana: Anapanasati (Deep Focus)</option>
                <option value="ujjayi">Pranayama: Ujjayi (Ocean Breath)</option>
                <option value="nadi">Pranayama: Nadi Shodhana (Alt. Nostril)</option>
            </select>
        </div>
        <div class="glass-panel">
            <button id="music-btn" title="Toggle Spotify Music" style="font-weight: bold;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M8 11.5c3.5-1.5 8-1 9.5 0"></path>
                    <path d="M8 15c2.5-1 6.5-.5 8.5 0"></path>
                    <path d="M8 8.5c4-2 9-1 11 0"></path>
                </svg>
                Spotify
            </button>
            <div style="width: 1px; height: 30px; background: rgba(255,255,255,0.2);"></div>
            <div class="timer-group" title="Current Inhale Duration">
                <span class="timer-label">Breath</span>
                <span class="timer-value" id="current-breath-timer">00.0s</span>
            </div>
            <div style="width: 1px; height: 30px; background: rgba(255,255,255,0.2);"></div>
            <div class="timer-group" title="Cumulative Practice Time Today">
                <span class="timer-label">Today</span>
                <span class="timer-value" id="daily-total-timer">00:00</span>
            </div>
            <div style="width: 1px; height: 30px; background: rgba(255,255,255,0.2);"></div>
            <button id="insights-btn" style="font-weight: bold;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
                Insights
            </button>
        </div>
    </div>

    <!-- Spotify Embed Player -->
    <div id="spotify-widget-container">
        <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DWZqd5JICZI0u?utm_source=generator&theme=0" width="300" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
    </div>

    <div id="zen-container">
        <div id="mesh-gradient"></div>
        <div id="nature-layer"></div>
        
        <div class="ui-overlay">
            <h1 id="instruction">Press & Hold to Inhale</h1>
            <div id="vibe-statusText">Find your center</div>
        </div>
        
        <div id="breathing-sphere"></div>
    </div>

    <!-- Wellness Insights & Logs Dashboard -->
    <div id="insights-modal">
        <div class="modal-content">
            <span class="close-btn" id="close-modal">&times;</span>
            <h2>Vedic Wellness Dashboard</h2>
            
            <div class="stat-grid">
                <div class="stat-card">
                    <h3>Today's Practice</h3>
                    <p id="stat-today">0 min</p>
                </div>
                <div class="stat-card">
                    <h3>Current Streak</h3>
                    <p id="stat-streak">0 days</p>
                </div>
            </div>

            <div class="log-section">
                <h3>Today's Breath History</h3>
                <div class="log-container" id="breath-log-list"></div>
            </div>

            <div class="suggestion-box" id="ai-suggestion"></div>
        </div>
    </div>

    <script>
        // DOM Elements
        const sphere = document.getElementById('breathing-sphere');
        const instruction = document.getElementById('instruction');
        const statusText = document.getElementById('vibe-statusText');
        const asanaSelector = document.getElementById('asana-selector');
        const natureLayer = document.getElementById('nature-layer');
        const musicBtn = document.getElementById('music-btn');
        const spotifyWidget = document.getElementById('spotify-widget-container');
        
        // Timers & Stats UI
        const currentBreathDisplay = document.getElementById('current-breath-timer');
        const dailyTotalDisplay = document.getElementById('daily-total-timer');
        const insightsBtn = document.getElementById('insights-btn');
        const insightsModal = document.getElementById('insights-modal');
        const closeModal = document.getElementById('close-modal');
        const logListContainer = document.getElementById('breath-log-list');

        // State Variables
        let currentMode = 'interactive';
        let breathStart;
        let isHolding = false;
        let autoInterval;
        let activeBreathInterval;
        let isSpotifyVisible = false;

        // Handle Spotify Toggle
        musicBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // Prevent triggering inhale
            isSpotifyVisible = !isSpotifyVisible;
            if(isSpotifyVisible) {
                spotifyWidget.classList.add('visible');
                musicBtn.style.color = '#1DB954'; // Spotify Green
            } else {
                spotifyWidget.classList.remove('visible');
                musicBtn.style.color = 'white';
            }
        });

        // Data Storage
        const todayStr = new Date().toLocaleDateString();
        let healthData = JSON.parse(localStorage.getItem('zenGardenHealthData')) || { 
            dailyTotals: {}, breathLogs: {}, streak: 0, lastLogin: null 
        };
        
        if (!healthData.dailyTotals[todayStr]) healthData.dailyTotals[todayStr] = 0;
        if (!healthData.breathLogs) healthData.breathLogs = {};
        if (!healthData.breathLogs[todayStr]) healthData.breathLogs[todayStr] = [];
            
        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        const yesterdayStr = yesterday.toLocaleDateString();
        
        if (healthData.lastLogin !== yesterdayStr && healthData.lastLogin !== todayStr) {
            healthData.streak = 1; 
        } else if (healthData.lastLogin === yesterdayStr) {
            healthData.streak += 1;
        }
        healthData.lastLogin = todayStr;
        saveData();

        function saveData() {
            localStorage.setItem('zenGardenHealthData', JSON.stringify(healthData));
            updateDailyTimerUI();
        }

        function formatTime(totalSeconds) {
            const m = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
            const s = Math.floor(totalSeconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function updateDailyTimerUI() {
            dailyTotalDisplay.innerText = formatTime(healthData.dailyTotals[todayStr]);
        }
        updateDailyTimerUI(); 

        function logBreathRecord(modeName, durationSeconds, isValid) {
            const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            healthData.breathLogs[todayStr].push({
                time: timestamp, mode: modeName, duration: parseFloat(durationSeconds.toFixed(1)), valid: isValid
            });
            saveData();
        }

        function renderLogs() {
            logListContainer.innerHTML = '';
            const logs = healthData.breathLogs[todayStr] || [];
            if(logs.length === 0) {
                logListContainer.innerHTML = '<div style="padding: 10px; opacity: 0.5;">No breaths recorded today.</div>';
                return;
            }
            [...logs].reverse().forEach(log => {
                const el = document.createElement('div');
                el.className = `log-item ${log.valid ? '' : 'warning'}`;
                el.innerHTML = `<span><span class="log-time">${log.time}</span> &nbsp; <span style="opacity:0.8">${log.mode}</span></span><span class="log-duration">${log.duration}s</span>`;
                logListContainer.appendChild(el);
            });
        }

        function createParticle() {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            const size = Math.random() * 5 + 2;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${Math.random() * 100}vw`;
            const duration = Math.random() * 10 + 5;
            particle.style.animationDuration = `${duration}s`;
            natureLayer.appendChild(particle);
            setTimeout(() => particle.remove(), duration * 1000);
        }
        setInterval(createParticle, 400);

        // Interactive Logic
        const handleInhale = (e) => {
            if (e.target.closest('#top-bar') || e.target.closest('#insights-modal') || e.target.closest('#spotify-widget-container')) return;

            if (currentMode !== 'interactive') return;
            if (e.type === 'mousedown' && e.button !== 0) return;
            
            isHolding = true;
            breathStart = Date.now();
            
            sphere.style.transition = "transform 3s ease-in-out, background 3s ease, box-shadow 3s ease";
            sphere.style.transform = "scale(3)";
            sphere.style.background = "rgba(255, 255, 255, 0.3)";
            sphere.style.boxShadow = "0 0 100px rgba(255, 255, 255, 0.4)";
            
            instruction.innerText = "Inhale...";
            statusText.innerText = "Keep holding";

            clearInterval(activeBreathInterval);
            activeBreathInterval = setInterval(() => {
                currentBreathDisplay.innerText = ((Date.now() - breathStart) / 1000).toFixed(1) + "s";
            }, 100);
        };

        const handleExhale = (e) => {
            if (currentMode !== 'interactive' || !isHolding) return;
            isHolding = false;
            
            clearInterval(activeBreathInterval);
            const breathDuration = (Date.now() - breathStart) / 1000;
            const isValid = breathDuration >= 3;
            
            healthData.dailyTotals[todayStr] += breathDuration;
            logBreathRecord("Mindful Touch", breathDuration, isValid);
            
            sphere.style.transform = "scale(1)";
            sphere.style.background = "rgba(255, 255, 255, 0.1)";
            sphere.style.boxShadow = "0 0 50px rgba(255, 255, 255, 0.05)";
            
            if (!isValid) {
                document.body.style.backgroundColor = "var(--panic-color)";
                instruction.innerText = "Too fast! Slower...";
                statusText.innerText = "Hold for at least 3 seconds";
                
                setTimeout(() => {
                    document.body.style.backgroundColor = "#0a0a0a";
                    if(!isHolding && currentMode === 'interactive') {
                        instruction.innerText = "Press & Hold to Inhale";
                        statusText.innerText = "Find your center";
                        currentBreathDisplay.innerText = "00.0s";
                    }
                }, 1500);
            } else {
                instruction.innerText = "Exhale...";
                statusText.innerText = "Good. Relax.";

                setTimeout(() => {
                    if(!isHolding && currentMode === 'interactive') {
                        instruction.innerText = "Press & Hold to Inhale";
                        statusText.innerText = "Find your center";
                        currentBreathDisplay.innerText = "00.0s";
                    }
                }, 2000);
            }
        };

        const startAutoMode = (mode) => {
            clearInterval(autoInterval);
            clearInterval(activeBreathInterval); 
            sphere.style.transition = "none";
            currentBreathDisplay.innerText = "Auto"; 
            
            if (mode === 'sama') {
                sphere.className = 'auto-breathe-sama';
                let step = 0;
                const samaCycle = () => {
                    if(step === 0) { instruction.innerText = "Inhale..."; statusText.innerText = "4 seconds"; }
                    else if(step === 1) { instruction.innerText = "Hold..."; statusText.innerText = "Retain the energy"; }
                    else if(step === 2) { instruction.innerText = "Exhale..."; statusText.innerText = "Release slowly"; }
                    else if(step === 3) { 
                        instruction.innerText = "Hold..."; statusText.innerText = "Empty your mind"; 
                        logBreathRecord("Sama Vritti Cycle", 16, true);
                    }
                    healthData.dailyTotals[todayStr] += 4;
                    saveData();
                    step = (step + 1) % 4;
                };
                samaCycle();
                autoInterval = setInterval(samaCycle, 4000);
            } 
            else if (mode === 'anapanasati') {
                sphere.className = ''; 
                sphere.style.transition = "transform 6s ease-in-out, background 6s ease";
                let isExhaling = true;
                const deepCycle = () => {
                    if(isExhaling) {
                        sphere.style.transform = "scale(3)";
                        sphere.style.background = "rgba(255, 255, 255, 0.3)";
                        instruction.innerText = "Deep Inhale...";
                        statusText.innerText = "Draw in nature's energy";
                    } else {
                        sphere.style.transform = "scale(1)";
                        sphere.style.background = "rgba(255, 255, 255, 0.1)";
                        instruction.innerText = "Deep Exhale...";
                        statusText.innerText = "Let go of tension";
                        logBreathRecord("Anapanasati Cycle", 12, true);
                    }
                    healthData.dailyTotals[todayStr] += 6;
                    saveData();
                    isExhaling = !isExhaling;
                };
                deepCycle();
                autoInterval = setInterval(deepCycle, 6000);
            }
            else if (mode === 'ujjayi') {
                sphere.className = 'auto-breathe-ujjayi';
                let isExhaling = true;
                const ujjayiCycle = () => {
                    if(isExhaling) {
                        instruction.innerText = "Inhale...";
                        statusText.innerText = "Constrict back of throat slightly";
                    } else {
                        instruction.innerText = "Exhale...";
                        statusText.innerText = "Create an ocean sound";
                        logBreathRecord("Ujjayi Breath", 10, true);
                    }
                    healthData.dailyTotals[todayStr] += 5;
                    saveData();
                    isExhaling = !isExhaling;
                };
                ujjayiCycle();
                autoInterval = setInterval(ujjayiCycle, 5000);
            }
            else if (mode === 'nadi') {
                sphere.className = 'auto-breathe-nadi';
                let step = 0;
                const nadiCycle = () => {
                    if(step === 0) { instruction.innerText = "Inhale Left..."; statusText.innerText = "Close right nostril"; }
                    else if(step === 1) { instruction.innerText = "Exhale Right..."; statusText.innerText = "Close left nostril"; }
                    else if(step === 2) { instruction.innerText = "Inhale Right..."; statusText.innerText = "Keep left closed"; }
                    else if(step === 3) { 
                        instruction.innerText = "Exhale Left..."; statusText.innerText = "Close right nostril"; 
                        logBreathRecord("Nadi Shodhana", 12, true);
                    }
                    healthData.dailyTotals[todayStr] += 3;
                    saveData();
                    step = (step + 1) % 4;
                };
                nadiCycle();
                autoInterval = setInterval(nadiCycle, 3000);
            }
        };

        asanaSelector.addEventListener('change', (e) => {
            currentMode = e.target.value;
            sphere.className = ''; 
            clearInterval(autoInterval);
            clearInterval(activeBreathInterval);
            currentBreathDisplay.innerText = "00.0s";
            
            if (currentMode === 'interactive') {
                instruction.innerText = "Press & Hold to Inhale";
                statusText.innerText = "Find your center";
                sphere.style.transition = "transform 3s ease-in-out, background 3s ease, box-shadow 3s ease";
                sphere.style.transform = "scale(1)";
            } else {
                startAutoMode(currentMode);
            }
        });

        window.addEventListener('mousedown', handleInhale);
        window.addEventListener('mouseup', handleExhale);
        window.addEventListener('touchstart', handleInhale, {passive: false});
        window.addEventListener('touchend', handleExhale);

        const generateSuggestion = () => {
            const todayTotal = healthData.dailyTotals[todayStr];
            const suggestionBox = document.getElementById('ai-suggestion');
            const hour = new Date().getHours();
            
            let suggestionHtml = "";
            if (todayTotal < 60) {
                suggestionHtml = `<strong>Diagnostic:</strong> Minimal vital breath capacity today.<br><br><strong>Yogic Recommendation:</strong> Begin with <em>Kapalabhati</em> to oxygenate the blood, followed by Surya Namaskar.`;
            } else if (todayTotal >= 60 && todayTotal < 300) {
                suggestionHtml = `<strong>Diagnostic:</strong> Consistent foundational practice.<br><br><strong>Yogic Recommendation:</strong> To deepen your practice, transition to <em>Nadi Shodhana</em> to foster equilibrium for deeper academic focus.`;
            } else {
                suggestionHtml = `<strong>Diagnostic:</strong> Advanced respiratory control achieved.<br><br><strong>Yogic Recommendation:</strong> Your capacity is primed for deeper states. Conclude with Yoga Nidra / Shavasana to integrate benefits.`;
            }

            if (hour < 10) {
                suggestionHtml += `<br><br><em>🌅 Morning Vitals:</em> Morning practice aligns with universal circadian rhythms. Focus on expansion.`;
            } else if (hour > 18) {
                suggestionHtml += `<br><br><em>🌙 Evening Vitals:</em> Prioritize parasympathetic activation. <em>Sama Vritti</em> will help down-regulate your nervous system.`;
            }
            suggestionBox.innerHTML = suggestionHtml;
        };

        insightsBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            document.getElementById('stat-today').innerText = `${Math.floor(healthData.dailyTotals[todayStr] / 60)}m ${Math.floor(healthData.dailyTotals[todayStr] % 60)}s`;
            document.getElementById('stat-streak').innerText = `${healthData.streak} days`;
            generateSuggestion();
            renderLogs(); 
            
            insightsModal.style.display = 'flex';
            setTimeout(() => insightsModal.style.opacity = '1', 10);
        });

        closeModal.addEventListener('click', (e) => {
            e.stopPropagation();
            insightsModal.style.opacity = '0';
            setTimeout(() => insightsModal.style.display = 'none', 500);
        });
        
        // Prevent interactions on interactive overlays from triggering inhale
        document.querySelector('.modal-content').addEventListener('mousedown', (e) => e.stopPropagation());
        document.querySelector('.modal-content').addEventListener('touchstart', (e) => e.stopPropagation());

    </script>
</body>
</html>
